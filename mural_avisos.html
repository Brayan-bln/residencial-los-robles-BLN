<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mural de avisos</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f4f8;
    padding: 30px 20px;
  }

  header {
    background: #1a4fa0;
    color: white;
    text-align: center;
    padding: 18px 20px;
    border-radius: 10px;
    margin-bottom: 30px;
  }

  header h1 { font-size: 22px; font-weight: 600; }
  header p { font-size: 13px; margin-top: 5px; opacity: 0.75; }

  .nav {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .nav button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.45);
    color: white;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .nav button:hover {
    background: white;
    color: #1a4fa0;
  }

  .contenedor {
    max-width: 700px;
    margin: auto;
  }

  .caja {
    background: white;
    padding: 22px;
    margin-bottom: 20px;
    border-radius: 12px;
    border: 1px solid #e4eaf2;
    transition: border-color 0.2s;
  }

  .caja:hover { border-color: #b3c9e8; }

  .caja h3 {
    color: #1a4fa0;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #1a4fa0;
  }

  input, textarea {
    width: 100%;
    padding: 8px 11px;
    margin-bottom: 12px;
    border: 1px solid #dde4ef;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    background: #fafbfd;
    outline: none;
    transition: border 0.15s, box-shadow 0.15s;
  }

  input:focus, textarea:focus {
    border-color: #1a4fa0;
    box-shadow: 0 0 0 3px rgba(26,79,160,0.1);
    background: white;
  }

  textarea { resize: vertical; min-height: 90px; }

  button {
    padding: 10px 18px;
    background: #1a4fa0;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  button:hover { background: #2563c4; }
  button:active { transform: scale(0.99); }

  .aviso {
    border: 1px solid #e4eaf2;
    border-left: 3px solid #1a4fa0;
    padding: 12px 14px;
    margin-top: 10px;
    border-radius: 10px;
    background: #f7fafd;
    position: relative;
  }

  .titulo {
    font-weight: 600;
    color: #1a4fa0;
    font-size: 14px;
  }

  .fecha {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }

  .btn-borrar {
    position: absolute;
    top: 10px;
    right: 10px;
    background: transparent;
    color: #cc3333;
    border: 1px solid #f0c0c0;
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-borrar:hover {
    background: #cc3333;
    color: white;
  }
</style>
</head>

<body>

<header>
    <h1>Residencial Los Robles</h1>
    <p>Módulo Mural de Avisos — Sprint 2</p>
    <div class="nav">
        <button onclick="location.href='alta-admin.html'">Administradores</button>
        <button onclick="location.href='mural_avisos.html'">Avisos</button>
        <button onclick="location.href='votaciones.html'">Votaciones</button>
    </div>
</header>

<div class="contenedor">

    
    <div class="caja">
        <h3>Nuevo aviso</h3>

        <input type="text" id="txtTitulo" placeholder="Título">
        <textarea id="txtContenido" placeholder="Escribe el aviso"></textarea>

        <button onclick="agregarAviso()">Publicar</button>
    </div>

    
    <div class="caja">
        <h3>Lista de avisos</h3>
        <div id="listaAvisos"></div>
    </div>

</div>

<script>
var avisos = [];

function agregarAviso() {
    var titulo = document.getElementById("txtTitulo").value;
    var contenido = document.getElementById("txtContenido").value;

    if (titulo === "" || contenido === "") {
        alert("Completa los campos");
        return;
    }

    var fecha = new Date().toLocaleString();

    var aviso = {
        id: avisos.length + 1,
        titulo: titulo,
        contenido: contenido,
        fecha: fecha
    };

    avisos.push(aviso);

    document.getElementById("txtTitulo").value = "";
    document.getElementById("txtContenido").value = "";

    mostrarAvisos();
}

function borrarAviso(id) {
    var nuevaLista = [];

    for (var i = 0; i < avisos.length; i++) {
        if (avisos[i].id !== id) {
            nuevaLista.push(avisos[i]);
        }
    }

    avisos = nuevaLista;

    mostrarAvisos();
}

function mostrarAvisos() {
    var contenedor = document.getElementById("listaAvisos");

    contenedor.innerHTML = "";

    if (avisos.length === 0) {
        contenedor.textContent = "No hay avisos";
        return;
    }

    for (var i = 0; i < avisos.length; i++) {
        var avisoActual = avisos[i];

        var divAviso = document.createElement("div");
        divAviso.className = "aviso";

        var divTitulo = document.createElement("div");
        divTitulo.className = "titulo";
        divTitulo.textContent = avisoActual.titulo;

        var divContenido = document.createElement("div");
        divContenido.textContent = avisoActual.contenido;

        var divFecha = document.createElement("div");
        divFecha.className = "fecha";
        divFecha.textContent = avisoActual.fecha;

        var boton = document.createElement("button");
        boton.className = "btn-borrar";
        boton.textContent = "X";

        boton.onclick = function(id) {
            return function() {
                borrarAviso(id);
            };
        }(avisoActual.id);

        divAviso.appendChild(divTitulo);
        divAviso.appendChild(divContenido);
        divAviso.appendChild(divFecha);
        divAviso.appendChild(boton);

        contenedor.appendChild(divAviso);
    }
}
</script>

</body>
</html>
