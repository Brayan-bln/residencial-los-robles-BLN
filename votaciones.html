<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Votaciones — Residencial Los Robles</title>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding: 30px 20px;
  }

  header {
    background: #1a4fa0;
    color: white;
    text-align: center;
    padding: 18px 20px;
    border-radius: 10px;
    margin-bottom: 30px;
  }

  header h1 { font-size: 22px; font-weight: 600; }
  header p { font-size: 13px; margin-top: 5px; opacity: 0.75; }

  .nav {
    margin-top: 12px;
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .nav button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.45);
    color: white;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .nav button:hover,
  .nav button.activo {
    background: white;
    color: #1a4fa0;
    font-weight: 600;
  }

  .contenedor {
    max-width: 750px;
    margin: auto;
  }

  .card {
    background: white;
    padding: 22px;
    margin-bottom: 22px;
    border-radius: 12px;
    border: 1px solid #e4eaf2;
    transition: border-color 0.2s;
  }

  .card:hover { border-color: #b3c9e8; }

  .card h2 {
    color: #1a4fa0;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid #1a4fa0;
    letter-spacing: -0.2px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #555;
    margin-bottom: 4px;
    font-weight: 500;
  }

  input, textarea {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid #dde4ef;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 13px;
    outline: none;
    background: #fafbfd;
    transition: border 0.15s, box-shadow 0.15s;
  }

  input:focus, textarea:focus {
    border-color: #1a4fa0;
    box-shadow: 0 0 0 3px rgba(26,79,160,0.1);
    background: white;
  }

  textarea { resize: vertical; min-height: 60px; }

  .opciones-grupo { margin-bottom: 13px; }

  .opcion-fila {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }

  .opcion-fila input { margin-bottom: 0; flex: 1; }

  .btn-add-opcion {
    background: none;
    border: 1px dashed #1a4fa0;
    color: #1a4fa0;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    width: 100%;
    margin-bottom: 13px;
    transition: background 0.15s;
  }

  .btn-add-opcion:hover { background: #eef3fb; }

  .btn-quitar {
    background: transparent;
    color: #cc3333;
    border: 1px solid #f0c0c0;
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .btn-quitar:hover { background: #cc3333; color: white; }

  .btn-principal {
    width: 100%;
    padding: 10px;
    background: #1a4fa0;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-principal:hover { background: #2563c4; }
  .btn-principal:active { transform: scale(0.99); }

  .votacion-item {
    border: 1px solid #e4eaf2;
    border-left: 3px solid #1a4fa0;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
    background: #f7fafd;
  }

  .votacion-item .v-titulo {
    font-weight: 600;
    color: #1a4fa0;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .votacion-item .v-desc {
    font-size: 13px;
    color: #666;
    margin-bottom: 12px;
  }

  .votacion-item .v-estado {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 12px;
  }

  .estado-abierta { background: #e3f4eb; color: #1b7c42; }
  .estado-cerrada { background: #fce4d6; color: #c62828; }

  .opcion-voto {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .opcion-voto .nombre-opcion {
    flex: 1;
    font-size: 13px;
    color: #444;
  }

  .barra-fondo {
    flex: 2;
    background: #e0e8f4;
    border-radius: 10px;
    height: 12px;
    overflow: hidden;
  }

  .barra-relleno {
    height: 100%;
    background: #1a4fa0;
    border-radius: 10px;
    transition: width 0.3s;
  }

  .opcion-voto .porcentaje {
    font-size: 12px;
    color: #888;
    width: 38px;
    text-align: right;
  }

  .btn-votar {
    background: #1a4fa0;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    margin-right: 6px;
    margin-top: 10px;
    transition: background 0.15s;
  }

  .btn-votar:hover { background: #2563c4; }

  .btn-cerrar-votacion {
    background: transparent;
    color: #cc3333;
    border: 1px solid #f0c0c0;
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    margin-top: 10px;
    transition: all 0.15s;
  }

  .btn-cerrar-votacion:hover { background: #cc3333; color: white; }

  .total-votos {
    font-size: 12px;
    color: #999;
    margin-top: 8px;
  }

  .vacio {
    text-align: center;
    color: #bbb;
    font-size: 13px;
    padding: 20px 0;
  }

  .mensaje {
    display: none;
    margin-top: 10px;
    padding: 9px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
  }

  .mensaje.ok { background: #e3f4eb; color: #1b7c42; }
  .mensaje.error { background: #fce4d6; color: #c62828; }
</style>
</head>
<body>

<header>
  <h1>Residencial Los Robles</h1>
  <p>Módulo de Votaciones — Sprint 3</p>
  <div class="nav">
    <button onclick="location.href='alta-admin.html'">Administradores</button>
    <button onclick="location.href='mural_avisos.html'">Avisos</button>
    <button class="activo">Votaciones</button>
  </div>
</header>

<div class="contenedor">

  <!-- CREAR VOTACIÓN -->
  <div class="card">
    <h2>➕ Crear nueva votación</h2>

    <label for="tituloVot">Título de la votación</label>
    <input type="text" id="tituloVot" placeholder="Ej. ¿Instalamos cámaras en la entrada?" />

    <label for="descVot">Descripción (opcional)</label>
    <textarea id="descVot" placeholder="Explica brevemente de qué trata la votación..."></textarea>

    <label>Opciones de respuesta</label>
    <div class="opciones-grupo" id="grupoOpciones">
      <div class="opcion-fila">
        <input type="text" placeholder="Opción 1" />
      </div>
      <div class="opcion-fila">
        <input type="text" placeholder="Opción 2" />
      </div>
    </div>

    <button class="btn-add-opcion" onclick="agregarOpcion()">+ Agregar otra opción</button>

    <button class="btn-principal" onclick="crearVotacion()">Publicar votación</button>
    <div class="mensaje" id="msgVotacion"></div>
  </div>

  <!-- LISTA DE VOTACIONES -->
  <div class="card">
    <h2>🗳️ Votaciones activas y cerradas</h2>
    <div id="listaVotaciones">
      <p class="vacio">Aún no hay votaciones publicadas.</p>
    </div>
  </div>

</div>

<script>
  var votaciones = [];

  // Agregar campo de opción extra
  function agregarOpcion() {
    var grupo = document.getElementById("grupoOpciones");
    var total = grupo.querySelectorAll(".opcion-fila").length + 1;

    var fila = document.createElement("div");
    fila.className = "opcion-fila";

    var input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Opción " + total;

    var btnQ = document.createElement("button");
    btnQ.className = "btn-quitar";
    btnQ.textContent = "✕";
    btnQ.onclick = function() { grupo.removeChild(fila); };

    fila.appendChild(input);
    fila.appendChild(btnQ);
    grupo.appendChild(fila);
  }

  function crearVotacion() {
    var titulo = document.getElementById("tituloVot").value.trim();
    var desc   = document.getElementById("descVot").value.trim();
    var inputs = document.querySelectorAll("#grupoOpciones .opcion-fila input");
    var msg    = document.getElementById("msgVotacion");

    if (titulo === "") {
      mostrarMsg(msg, "⚠️ El título es obligatorio.", "error"); return;
    }

    var opciones = [];
    for (var i = 0; i < inputs.length; i++) {
      var val = inputs[i].value.trim();
      if (val !== "") opciones.push({ texto: val, votos: 0 });
    }

    if (opciones.length < 2) {
      mostrarMsg(msg, "⚠️ Necesitas al menos 2 opciones.", "error"); return;
    }

    var nueva = {
      id:      votaciones.length + 1,
      titulo:  titulo,
      desc:    desc,
      opciones: opciones,
      estado:  "Abierta",
      fecha:   new Date().toLocaleDateString("es-MX")
    };

    votaciones.push(nueva);

    // Limpiar formulario
    document.getElementById("tituloVot").value = "";
    document.getElementById("descVot").value   = "";
    var grupo = document.getElementById("grupoOpciones");
    grupo.innerHTML =
      '<div class="opcion-fila"><input type="text" placeholder="Opción 1"/></div>' +
      '<div class="opcion-fila"><input type="text" placeholder="Opción 2"/></div>';

    mostrarMsg(msg, "✅ Votación publicada con éxito.", "ok");
    renderVotaciones();
  }

  function votar(votId, opcionIdx) {
    for (var i = 0; i < votaciones.length; i++) {
      if (votaciones[i].id === votId) {
        if (votaciones[i].estado === "Cerrada") return;
        votaciones[i].opciones[opcionIdx].votos++;
        break;
      }
    }
    renderVotaciones();
  }

  function cerrarVotacion(votId) {
    for (var i = 0; i < votaciones.length; i++) {
      if (votaciones[i].id === votId) {
        votaciones[i].estado = "Cerrada"; break;
      }
    }
    renderVotaciones();
  }

  function renderVotaciones() {
    var contenedor = document.getElementById("listaVotaciones");

    if (votaciones.length === 0) {
      contenedor.innerHTML = '<p class="vacio">Aún no hay votaciones publicadas.</p>';
      return;
    }

    var html = "";
    for (var i = 0; i < votaciones.length; i++) {
      var v = votaciones[i];

      // Total de votos
      var totalVotos = 0;
      for (var j = 0; j < v.opciones.length; j++) totalVotos += v.opciones[j].votos;

      html += '<div class="votacion-item">';
      html += '<div class="v-titulo">🗳️ ' + v.titulo + '</div>';
      if (v.desc) html += '<div class="v-desc">' + v.desc + '</div>';
      html += '<span class="v-estado estado-' + v.estado.toLowerCase() + '">' + v.estado + '</span>';

      // Opciones con barra de progreso
      for (var j = 0; j < v.opciones.length; j++) {
        var op  = v.opciones[j];
        var pct = totalVotos > 0 ? Math.round((op.votos / totalVotos) * 100) : 0;

        html += '<div class="opcion-voto">';
        html += '  <span class="nombre-opcion">' + op.texto + '</span>';
        html += '  <div class="barra-fondo"><div class="barra-relleno" style="width:' + pct + '%"></div></div>';
        html += '  <span class="porcentaje">' + pct + '%</span>';

        if (v.estado === "Abierta") {
          html += '  <button class="btn-votar" onclick="votar(' + v.id + ',' + j + ')">Votar</button>';
        }
        html += '</div>';
      }

      html += '<div class="total-votos">Total de votos: ' + totalVotos + '  —  Publicada el ' + v.fecha + '</div>';

      if (v.estado === "Abierta") {
        html += '<button class="btn-cerrar-votacion" onclick="cerrarVotacion(' + v.id + ')">Cerrar votación</button>';
      }

      html += '</div>';
    }

    contenedor.innerHTML = html;
  }

  function mostrarMsg(el, texto, tipo) {
    el.textContent   = texto;
    el.className     = "mensaje " + tipo;
    el.style.display = "block";
    setTimeout(function() { el.style.display = "none"; }, 3000);
  }
</script>

</body>
</html>
