<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase 1</title>
</head>
<body>
    <header>
        <h1>Residencial Los Robles</h1>
        <p>Módulo de Alta de Administrador — Sprint 1</p>
    </header>
 
    <div class="contenedor">
    
    <!-- FORMULARIO -->
    <div class="card">
        <h2>Registrar Administrador</h2>
    
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej. Juan Pérez García" />
    
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="Ej. juan@losrobles.com" />
    
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" placeholder="Mínimo 6 caracteres" />
    
        <label for="rol">Rol</label>
        <select id="rol">
        <option value="">-- Selecciona un rol --</option>
        <option value="Administrador General">Administrador General</option>
        <option value="Administrador de Cobranza">Administrador de Cobranza</option>
        <option value="Administrador de Seguridad">Administrador de Seguridad</option>
        </select>
    
        <button class="btn-guardar" onclick="guardarAdmin()">Guardar Administrador</button>
    
        <div class="mensaje" id="mensaje"></div>
    </div>
    
    <!-- LISTA -->
    <div class="card">
        <h2>Administradores Registrados</h2>
        <p class="contador" id="contador">Total: 0 administrador(es)</p>
        <div id="lista-admins">
        <p class="vacio">Aún no hay administradores registrados.</p>
        </div>
    </div>
    
    </div>
</body>
</html>
